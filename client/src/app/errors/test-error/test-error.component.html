<ng-container>
    <button class="btn btn-outline-primary me-3" (click)="getServerError()">Test 500 error</button>
    <button class="btn btn-outline-primary me-3" (click)="getBadRequestError()">Test 400 error</button>
    <button class="btn btn-outline-primary me-3" (click)="get404Error()">Test 404 error</button>
    <button class="btn btn-outline-primary me-3" (click)="getAuthError()">Test 500 error</button>

    <div class="row mt-5" *ngIf="validationErrors.length > 0">
        <ul class="text-danger">
            <li *ngFor="let error of validationErrors">
                {{error}}
            </li>
        </ul>
    </div>
</ng-container>
